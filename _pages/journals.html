<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');

:root {
  --abdc-astar: #b45309;
  --abdc-a:     #1d4ed8;
  --abdc-b:     #15803d;
  --abdc-c:     #6b7280;
  --abs-4star:  #7c3aed;
  --abs-4:      #0891b2;
  --abs-3:      #0d9488;
  --abs-2:      #d97706;
  --abs-1:      #9ca3af;
  --bg:         #fafaf9;
  --surface:    #ffffff;
  --border:     #e7e5e4;
  --text:       #1c1917;
  --muted:      #78716c;
  --accent:     #b45309;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

#jrk-wrap {
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  background: var(--bg);
  padding: 2rem 0 4rem;
}

#jrk-wrap h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 2.2rem;
  font-weight: 400;
  letter-spacing: -0.02em;
  margin-bottom: 0.3rem;
  color: var(--text);
}

#jrk-wrap .subtitle {
  font-size: 0.9rem;
  color: var(--muted);
  margin-bottom: 1.8rem;
}

/* Search + Filters */
.jrk-controls {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.2rem 1.4rem;
  margin-bottom: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.jrk-search-row {
  display: flex;
  gap: 0.75rem;
  align-items: center;
}

#jrk-search {
  flex: 1;
  padding: 0.65rem 1rem;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.92rem;
  color: var(--text);
  background: var(--bg);
  outline: none;
  transition: border-color 0.15s;
}
#jrk-search:focus { border-color: var(--accent); }
#jrk-search::placeholder { color: var(--muted); }

.jrk-filter-row {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  align-items: center;
}

.jrk-filter-label {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  margin-right: 0.25rem;
}

.jrk-btn {
  padding: 0.3rem 0.75rem;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--muted);
}
.jrk-btn:hover { border-color: #a8a29e; color: var(--text); }
.jrk-btn.active { color: white; border-color: transparent; }

.jrk-btn[data-abdc="A*"].active  { background: var(--abdc-astar); }
.jrk-btn[data-abdc="A"].active   { background: var(--abdc-a); }
.jrk-btn[data-abdc="B"].active   { background: var(--abdc-b); }
.jrk-btn[data-abdc="C"].active   { background: var(--abdc-c); }

.jrk-btn[data-abs="4*"].active   { background: var(--abs-4star); }
.jrk-btn[data-abs="4"].active    { background: var(--abs-4); }
.jrk-btn[data-abs="3"].active    { background: var(--abs-3); }
.jrk-btn[data-abs="2"].active    { background: var(--abs-2); }
.jrk-btn[data-abs="1"].active    { background: var(--abs-1); }

#jrk-for-select {
  padding: 0.32rem 0.75rem;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  color: var(--muted);
  cursor: pointer;
  outline: none;
}
#jrk-for-select:focus { border-color: var(--accent); }

/* Status bar */
.jrk-status {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.82rem;
  color: var(--muted);
  margin-bottom: 1rem;
}

.jrk-clear-btn {
  background: none;
  border: none;
  font-size: 0.8rem;
  color: var(--accent);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  padding: 0;
}
.jrk-clear-btn:hover { text-decoration: underline; }

/* Grid */
.jrk-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1rem;
}

/* Card */
.jrk-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.1rem 1.2rem;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  transition: box-shadow 0.15s, transform 0.15s;
  position: relative;
}
.jrk-card:hover {
  box-shadow: 0 4px 20px rgba(0,0,0,0.07);
  transform: translateY(-1px);
}

.jrk-card-title {
  font-family: 'DM Serif Display', serif;
  font-size: 0.98rem;
  font-weight: 400;
  line-height: 1.35;
  color: var(--text);
  padding-right: 0.5rem;
}

.jrk-card-publisher {
  font-size: 0.75rem;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.jrk-card-meta {
  font-size: 0.72rem;
  color: var(--muted);
}

.jrk-card-rankings {
  display: flex;
  gap: 0.5rem;
  margin-top: 0.2rem;
  flex-wrap: wrap;
}

.jrk-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.2rem 0.6rem;
  border-radius: 5px;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.01em;
}

.jrk-badge .badge-label {
  font-weight: 400;
  opacity: 0.75;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.jrk-badge-abdc-astar { background: #fef3c7; color: var(--abdc-astar); }
.jrk-badge-abdc-a     { background: #dbeafe; color: var(--abdc-a); }
.jrk-badge-abdc-b     { background: #dcfce7; color: var(--abdc-b); }
.jrk-badge-abdc-c     { background: #f3f4f6; color: var(--abdc-c); }
.jrk-badge-abdc-na    { background: #f3f4f6; color: #d1d5db; }

.jrk-badge-abs-4star  { background: #ede9fe; color: var(--abs-4star); }
.jrk-badge-abs-4      { background: #cffafe; color: var(--abs-4); }
.jrk-badge-abs-3      { background: #ccfbf1; color: var(--abs-3); }
.jrk-badge-abs-2      { background: #fef3c7; color: var(--abs-2); }
.jrk-badge-abs-1      { background: #f3f4f6; color: var(--abs-1); }
.jrk-badge-abs-na     { background: #f3f4f6; color: #d1d5db; }

.jrk-for-tag {
  font-size: 0.68rem;
  color: var(--muted);
  background: #f5f5f4;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  display: inline-block;
  margin-top: 0.1rem;
}

/* Pagination */
.jrk-pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 0.5rem;
  margin-top: 2rem;
  flex-wrap: wrap;
}

.jrk-page-btn {
  padding: 0.35rem 0.8rem;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  cursor: pointer;
  color: var(--text);
  transition: all 0.15s;
  min-width: 36px;
  text-align: center;
}
.jrk-page-btn:hover { border-color: var(--accent); color: var(--accent); }
.jrk-page-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
.jrk-page-btn:disabled { opacity: 0.35; cursor: default; }

.jrk-no-results {
  text-align: center;
  padding: 3rem;
  color: var(--muted);
  font-size: 0.9rem;
  grid-column: 1/-1;
}
</style>

const PER_PAGE = 24;
let filtered = RAW;
let page = 1;
let activeAbdc = new Set();
let activeAbs  = new Set();
let activeFor  = '';
let searchQ    = '';

function abdcClass(v) {
  if (!v) return 'jrk-badge-abdc-na';
  return { 'A*':'jrk-badge-abdc-astar','A':'jrk-badge-abdc-a','B':'jrk-badge-abdc-b','C':'jrk-badge-abdc-c' }[v] || 'jrk-badge-abdc-na';
}
function absClass(v) {
  if (!v) return 'jrk-badge-abs-na';
  return { '4*':'jrk-badge-abs-4star','4':'jrk-badge-abs-4','3':'jrk-badge-abs-3','2':'jrk-badge-abs-2','1':'jrk-badge-abs-1' }[v] || 'jrk-badge-abs-na';
}
function badgeText(v) { return v || '—'; }

function applyFilters() {
  const q = searchQ.toLowerCase().trim();
  filtered = RAW.filter(j => {
    if (q && !j.t.toLowerCase().includes(q) && !j.i.includes(q)) return false;
    if (activeAbdc.size && !activeAbdc.has(j.a)) return false;
    if (activeAbs.size  && !activeAbs.has(j.b))  return false;
    if (activeFor       && j.f !== activeFor)      return false;
    return true;
  });
  page = 1;
  render();
}

function render() {
  const total = filtered.length;
  document.getElementById('jrk-count').textContent =
    `Showing ${total.toLocaleString()} journal${total !== 1 ? 's' : ''}`;

  const start = (page - 1) * PER_PAGE;
  const slice = filtered.slice(start, start + PER_PAGE);
  const grid = document.getElementById('jrk-grid');

  if (slice.length === 0) {
    grid.innerHTML = '<div class="jrk-no-results">No journals match your search. Try adjusting your filters.</div>';
    document.getElementById('jrk-pagination').innerHTML = '';
    return;
  }

  grid.innerHTML = slice.map(j => `
    <div class="jrk-card">
      <div class="jrk-card-title">${escHtml(j.t)}</div>
      ${j.p ? `<div class="jrk-card-publisher">${escHtml(j.p)}</div>` : ''}
      <div class="jrk-card-rankings">
        <span class="jrk-badge ${abdcClass(j.a)}">
          <span class="badge-label">ABDC</span> ${badgeText(j.a)}
        </span>
        <span class="jrk-badge ${absClass(j.b)}">
          <span class="badge-label">ABS</span> ${badgeText(j.b)}
        </span>
      </div>
      <div style="display:flex;flex-wrap:wrap;align-items:center;gap:4px;margin-top:2px;">
        ${j.fl ? `<span class="jrk-for-tag">${escHtml(j.fl)}</span>` : ''}
        ${j.y ? `<span class="jrk-for-tag" style="background:#f0f9ff;color:#0369a1;">Est. ${j.y}</span>` : ''}
        ${j.i ? `<span class="jrk-card-meta" style="font-size:0.7rem;color:var(--muted);">ISSN ${j.i}</span>` : ''}
      </div>
    </div>
  `).join('');

  renderPagination(total);
}

function renderPagination(total) {
  const totalPages = Math.ceil(total / PER_PAGE);
  const pg = document.getElementById('jrk-pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }

  let html = '';
  html += `<button class="jrk-page-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>‹</button>`;

  const pages = getPageRange(page, totalPages);
  pages.forEach(p => {
    if (p === '…') {
      html += `<span style="color:var(--muted);padding:0 2px">…</span>`;
    } else {
      html += `<button class="jrk-page-btn ${p===page?'active':''}" onclick="goPage(${p})">${p}</button>`;
    }
  });

  html += `<button class="jrk-page-btn" onclick="goPage(${page+1})" ${page===totalPages?'disabled':''}>›</button>`;
  pg.innerHTML = html;
}

function getPageRange(cur, total) {
  if (total <= 7) return Array.from({length:total},(_,i)=>i+1);
  const pages = [1];
  if (cur > 3) pages.push('…');
  for (let p = Math.max(2,cur-1); p <= Math.min(total-1,cur+1); p++) pages.push(p);
  if (cur < total-2) pages.push('…');
  pages.push(total);
  return pages;
}

function goPage(p) {
  page = p;
  render();
  document.getElementById('jrk-wrap').scrollIntoView({behavior:'smooth'});
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Search
document.getElementById('jrk-search').addEventListener('input', e => {
  searchQ = e.target.value;
  applyFilters();
});

// ABDC toggle
document.querySelectorAll('[data-abdc]').forEach(btn => {
  btn.addEventListener('click', () => {
    const v = btn.dataset.abdc;
    if (activeAbdc.has(v)) { activeAbdc.delete(v); btn.classList.remove('active'); }
    else { activeAbdc.add(v); btn.classList.add('active'); }
    applyFilters();
  });
});

// ABS toggle
document.querySelectorAll('[data-abs]').forEach(btn => {
  btn.addEventListener('click', () => {
    const v = btn.dataset.abs;
    if (activeAbs.has(v)) { activeAbs.delete(v); btn.classList.remove('active'); }
    else { activeAbs.add(v); btn.classList.add('active'); }
    applyFilters();
  });
});

// FoR filter
document.getElementById('jrk-for-select').addEventListener('change', e => {
  activeFor = e.target.value;
  applyFilters();
});

// Clear
document.getElementById('jrk-clear').addEventListener('click', () => {
  searchQ = ''; activeAbdc = new Set(); activeAbs = new Set(); activeFor = '';
  document.getElementById('jrk-search').value = '';
  document.getElementById('jrk-for-select').value = '';
  document.querySelectorAll('[data-abdc],[data-abs]').forEach(b => b.classList.remove('active'));
  applyFilters();
});

render();
</script>
